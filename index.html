<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>판다마켓</title>

    <link rel="icon" href="images/logo/favicon.ico" />

    <link
      rel="stylesheet"
      as="style"
      crossorigin
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />

    <link rel="stylesheet" href="styles/reset.css" />
    <link rel="stylesheet" href="styles/global.css" />
    <link rel="stylesheet" href="styles/home.css" />
  </head>

  <body>
    <header class="gnb">
      <nav class="gnb-inner" aria-label="주요 메뉴">
        <a href="/" class="logo-link">
          <img src="images/logo/panda-market-logo.png" alt="판다마켓 홈" />
        </a>
        <a href="/login" class="button login-button">로그인</a>
      </nav>
    </header>

    <main>
      <section id="hero">
        <div class="wrapper">
          <h1>
            일상의 모든 물건을
            <br />
            거래해 보세요
          </h1>
          <a href="/items" class="button pill-button">구경하러 가기</a>
        </div>
      </section>

      <section id="features" class="wrapper" aria-label="판다마켓 주요 기능">
        <div class="feature">
          <img
            src="images/home/feature1-image.png"
            alt="판다마켓의 인기 상품을 살펴보는 모습"
          />

          <div class="feature-content">
            <p class="feature-tag">Hot item</p>
            <h2>
              인기 상품을
              <br />
              확인해 보세요
            </h2>
            <p class="feature-description">
              가장 HOT한 중고거래 물품을
              <br />
              판다마켓에서 확인해 보세요
            </p>
          </div>
        </div>

        <div class="feature">
          <div class="feature-content">
            <p class="feature-tag">Search</p>
            <h2>
              구매를 원하는
              <br />
              상품을 검색하세요
            </h2>
            <p class="feature-description">
              구매하고 싶은 물품은 검색해서
              <br />
              쉽게 찾아보세요
            </p>
          </div>

          <img
            src="images/home/feature2-image.png"
            alt="판다마켓에서 상품을 검색하는 모습"
          />
        </div>

        <div class="feature">
          <img
            src="images/home/feature3-image.png"
            alt="판다마켓에서 원하는 상품을 등록하는 모습"
          />

          <div class="feature-content">
            <p class="feature-tag">Register</p>
            <h2>
              판매를 원하는
              <br />
              상품을 등록하세요
            </h2>
            <p class="feature-description">
              어떤 물건이든 판매하고 싶은 상품을
              <br />
              쉽게 등록하세요
            </p>
          </div>
        </div>
      </section>

      <section id="bottomBanner">
        <h2>
          믿을 수 있는
          <br />
          판다마켓 중고거래
        </h2>
      </section>
    </main>

    <footer>
      <p>©codeit - 2024</p>

      <nav aria-label="푸터 메뉴">
        <a href="/privacy">Privacy Policy</a>
        <a href="/faq">FAQ</a>
      </nav>

      <div>
        <a
          href="https://www.facebook.com"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="images/social/facebook-logo.svg" alt="페이스북" />
        </a>
        <a
          href="https://twitter.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="images/social/twitter-logo.svg" alt="트위터" />
        </a>
        <a
          href="https://www.youtube.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="images/social/youtube-logo.svg" alt="유튜브" />
        </a>
        <a
          href="https://www.instagram.com/"
          target="_blank"
          rel="noopener noreferrer"
        >
          <img src="images/social/instagram-logo.svg" alt="인스타그램" />
        </a>
      </div>
    </footer>
  </body>
</html>
